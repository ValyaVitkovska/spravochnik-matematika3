<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f6ef7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1f2e" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Интерактивен математически справочник за гимназиален етап — формули, теореми, чертежи и типови задачи за 8.–12. клас.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Мат. справочник">

  <title>Математически справочник 8.–12. клас</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="app-header">
    <a class="header-logo" onclick="goHome()" style="cursor:pointer;">
      ∑ <span>Справочник</span>
    </a>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <button id="back-btn" class="icon-btn" onclick="goBack()" title="Назад" style="display:none;" aria-label="Назад">←</button>
      <button id="fav-btn" class="icon-btn" onclick="toggleFav()" title="Добави в любими" style="display:none;" aria-label="Любими">☆</button>
      <button class="icon-btn" onclick="goFavorites()" title="Любими" aria-label="Всички любими">⭐</button>
      <button id="theme-btn" class="icon-btn" onclick="toggleTheme()" title="Тема" aria-label="Смяна на темата">🌙</button>
    </div>
  </header>

  <nav id="breadcrumb" class="breadcrumb" aria-label="Навигация"></nav>

  <div id="home-banner"></div>

  <div id="search-area" style="max-width:680px;margin:0 auto;padding:12px 16px 0;">
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input type="search" id="search-input" class="search-input"
        placeholder="Търси тема, формула, понятие…"
        autocomplete="off" spellcheck="false" aria-label="Търсене">
      <button id="search-clear" class="search-clear" onclick="clearSearch()" aria-label="Изчисти">✕</button>
    </div>
    <div id="search-results" class="search-results" role="list" aria-live="polite"></div>
  </div>

  <main id="main-content" class="main-content" role="main">
    <div style="text-align:center;padding:48px 24px;color:var(--text-muted);">Зарежда се…</div>
  </main>

  <footer id="app-credits" class="app-credits"></footer>

  <!-- KaTeX и Three.js първо, после app.js — БЕЗ defer, за да са готови преди app.js -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="./three.min.js"></script>
  <script src="./app.js"></script>

</body>
</html>
